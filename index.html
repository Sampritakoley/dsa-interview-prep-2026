<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Tree DSA — Master Interview Question List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #8b92a8;
  --text3: #555e78;
  --accent: #4f8ef7;
  --accent2: #2d5fc4;
  --green: #3ecf8e;
  --amber: #f5a623;
  --red: #f56565;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --easy-bg: #0d2b1a; --easy-fg: #3ecf8e;
  --med-bg: #2b1f0a; --med-fg: #f5a623;
  --hard-bg: #2b0d0d; --hard-fg: #f56565;
  --rare-bg: #1a1d26; --rare-fg: #8b92a8;
  --occ-bg: #0d1a2b; --occ-fg: #4f8ef7;
  --freq-bg: #0d2b20; --freq-fg: #2dd4bf;
  --vfreq-bg: #1e1533; --vfreq-fg: #a78bfa;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f6fa; --bg2: #ffffff; --bg3: #eef0f6;
    --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
    --text: #1a1d2e; --text2: #555e78; --text3: #9aa0b8;
    --accent: #2563eb; --accent2: #1d4ed8;
    --easy-bg: #dcfce7; --easy-fg: #166534;
    --med-bg: #fef3c7; --med-fg: #92400e;
    --hard-bg: #fee2e2; --hard-fg: #991b1b;
    --rare-bg: #f1f5f9; --rare-fg: #475569;
    --occ-bg: #dbeafe; --occ-fg: #1e40af;
    --freq-bg: #d1fae5; --freq-fg: #065f46;
    --vfreq-bg: #ede9fe; --vfreq-fg: #5b21b6;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}

/* Header */
header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:2rem 2rem 1.5rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem}
h1{font-family:var(--font-display);font-weight:600;font-size:clamp(1.4rem,3vw,2rem);color:var(--text);letter-spacing:-0.02em;line-height:1.2}
h1 span{color:var(--accent)}
.subtitle{font-size:13px;color:var(--text2);margin-top:4px}
.stats-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
.stat{text-align:left}
.stat-num{font-family:var(--font-mono);font-size:1.5rem;font-weight:500;color:var(--text);line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.stat-sep{width:1px;background:var(--border2);align-self:stretch}

.progress-wrap{margin-bottom:1rem}
.progress-label{font-size:13px;color:var(--text2);margin-bottom:6px}
.progress-bar-bg{background:var(--bg3);border-radius:20px;height:8px;overflow:hidden}
.progress-bar-fill{height:8px;border-radius:20px;background:var(--green);transition:width .4s ease}
.done-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-family:var(--font-mono);transition:all .2s;white-space:nowrap}
.done-btn.completed{background:var(--easy-bg);color:var(--easy-fg);border-color:var(--easy-fg)}
  
/* Filters */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:6px 12px;font-size:13px;font-family:var(--font-body);outline:none;cursor:pointer;transition:border-color .15s}
.filter-bar select:hover,.filter-bar input:hover{border-color:var(--accent)}
.filter-bar input{width:220px}
.filter-bar input::placeholder{color:var(--text3)}
.clear-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.clear-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Main */
main{max-width:1400px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* Section */
.section{margin-bottom:1.5rem;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sec-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);cursor:pointer;user-select:none;transition:background .15s}
.sec-header:hover{background:var(--bg3)}
.chevron{width:16px;height:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.sec-num{font-family:var(--font-mono);font-size:11px;color:var(--text3);min-width:20px}
.sec-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.sec-badge{font-family:var(--font-mono);font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 10px}

/* Table */
.tbl-wrap{overflow-x:auto;border-top:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr.q-row:hover td{background:var(--bg3)}
tr.q-row.hidden{display:none}
.q-name{font-weight:500;color:var(--text)}
.q-idx{font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-right:6px}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap;font-family:var(--font-mono)}
.d-e{background:var(--easy-bg);color:var(--easy-fg)}
.d-m{background:var(--med-bg);color:var(--med-fg)}
.d-h{background:var(--hard-bg);color:var(--hard-fg)}
.f-r{background:var(--rare-bg);color:var(--rare-fg)}
.f-o{background:var(--occ-bg);color:var(--occ-fg)}
.f-f{background:var(--freq-bg);color:var(--freq-fg)}
.f-v{background:var(--vfreq-bg);color:var(--vfreq-fg)}

/* Company tags */
.cos{display:flex;flex-wrap:wrap;gap:3px;max-width:320px}
.co-tag{font-size:10px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;white-space:nowrap}

/* LC link */
.lc{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.lc:hover{text-decoration:underline}
.lc-custom{font-family:var(--font-mono);font-size:12px;color:var(--text3)}

/* No results */
.no-results{padding:3rem;text-align:center;color:var(--text3);font-size:14px;display:none}
.no-results.show{display:block}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:0 0 1rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* Responsive */
@media(max-width:600px){
  header,main{padding-left:1rem;padding-right:1rem}
  h1{font-size:1.2rem}
  .stats-row{gap:1rem}
  .filter-bar input{width:160px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>

        <p class="subtitle">Complete interview question reference · FAANG + Indian unicorns · Filterable</p>

</header>

<main>

</div>
  <div id="sections"></div>
  <div class="no-results" id="noResults">No questions match the current filters.</div>
</main>

function diffClass(d){return d==='Easy'?'d-e':d==='Medium'?'d-m':'d-h'}
function freqClass(f){return f==='Rare'?'f-r':f==='Occasional'?'f-o':f==='Frequent'?'f-f':'f-v'}
function lcEl(lc){
  if(lc==='Custom') return `<span class="lc-custom">Custom</span>`;
  return `<a class="lc" href="https://leetcode.com/problems/" target="_blank" rel="noopener" title="LeetCode #${lc}">#${lc}</a>`;
}
function coEl(arr){return`<div class="cos">${arr.map(c=>`<span class="co-tag">${c}</span>`).join('')}</div>`}

let total=0;
DATA.forEach(s=>total+=s.items.length);

function build(){
  const container=document.getElementById('sections');
  container.innerHTML='';
  DATA.forEach((sec,si)=>{
    const div=document.createElement('div');
    div.className='section';
    div.innerHTML=`
    <div class="sec-header" onclick="toggleSec(${si})" role="button" aria-expanded="true">
      <svg class="chevron open" id="ch${si}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="sec-num">${String(si+1).padStart(2,'0')}</span>
      <span class="sec-title">${sec.sec}</span>
      <span class="sec-badge" id="sc${si}">${sec.items.length}</span>
    </div>
    <div id="sb${si}">
      <div class="tbl-wrap">
      <table>
        <thead><tr>
  <th style="width:35%">Question</th>
  <th>Difficulty</th>
  <th>LeetCode</th>
  <th>Companies</th>
  <th>Frequency</th>
  <th>Status</th>
</tr></thead>
       <tbody>
  ${sec.items.map((it,j)=>`<tr class="q-row" id="r${si}_${j}" data-d="${it.d}" data-f="${it.fr}" data-co="${it.co.join('|')}" data-q="${it.q.toLowerCase()}">
    <td><span class="q-idx">${j+1}</span><span class="q-name">${it.q}</span></td>
    <td><span class="badge ${diffClass(it.d)}">${it.d}</span></td>
    <td>${lcEl(it.lc)}</td>
    <td>${coEl(it.co)}</td>
    <td><span class="badge ${freqClass(it.fr)}">${it.fr}</span></td>
    <td><button class="done-btn" id="btn_${si}_${j}" onclick="toggleDone('${si}_${j}', this)">Mark done</button></td>
  </tr>`).join('')}
</tbody>
      </table>
      </div>
    </div>`;
    container.appendChild(div);
  });
}

function toggleSec(i){
  const body=document.getElementById('sb'+i);
  const ch=document.getElementById('ch'+i);
  const open=body.style.display!=='none'&&body.style.display!=='';
  body.style.display=open?'none':'block';
  ch.classList.toggle('open',!open);
}

function applyFilters(){
  const diff=document.getElementById('fDiff').value;
  const freq=document.getElementById('fFreq').value;
  const co=document.getElementById('fCo').value;
  const search=document.getElementById('fSearch').value.toLowerCase().trim();
  let vis=0;
  DATA.forEach((sec,si)=>{
    let secVis=0;
    sec.items.forEach((_,j)=>{
      const row=document.getElementById('r'+si+'_'+j);
      if(!row)return;
      let show=true;
      if(diff&&row.dataset.d!==diff)show=false;
      if(freq&&row.dataset.f!==freq)show=false;
      if(co&&!row.dataset.co.split('|').includes(co))show=false;
      if(search&&!row.dataset.q.includes(search))show=false;
      row.classList.toggle('hidden',!show);
      if(show){secVis++;vis++;}
    });
    const body=document.getElementById('sb'+si);
    const ch=document.getElementById('ch'+si);
    const badge=document.getElementById('sc'+si);
    const anyFilter=diff||freq||co||search;
    if(secVis===0&&anyFilter){
      if(body)body.style.display='none';
      if(ch)ch.classList.remove('open');
    } else {
      if(body)body.style.display='block';
      if(ch)ch.classList.add('open');
    }
    if(badge)badge.textContent=anyFilter?`${secVis}/${sec.items.length}`:sec.items.length;
  });
  document.getElementById('visCount').textContent=vis;
  document.getElementById('noResults').classList.toggle('show',vis===0);
}
function toggleDone(id, btn) {
  const done = JSON.parse(localStorage.getItem('done') || '{}');
  if (done[id]) { delete done[id]; } else { done[id] = true; }
  localStorage.setItem('done', JSON.stringify(done));
  btn.classList.toggle('completed', !!done[id]);
  btn.textContent = done[id] ? '✓ Done' : 'Mark done';
  updateProgress();
}

function updateProgress() {
  const done = JSON.parse(localStorage.getItem('done') || '{}');
  const count = Object.keys(done).length;
  document.getElementById('doneCount').textContent = count;
  document.getElementById('progressBar').style.width = (count / 130 * 100).toFixed(1) + '%';
}

function loadDoneState() {
  const done = JSON.parse(localStorage.getItem('done') || '{}');
  Object.keys(done).forEach(id => {
    const btn = document.getElementById('btn_' + id);
    if (btn) { btn.classList.add('completed'); btn.textContent = '✓ Done'; }
  });
  updateProgress();
}
function clearFilters(){
  document.getElementById('fDiff').value='';
  document.getElementById('fFreq').value='';
  document.getElementById('fCo').value='';
  document.getElementById('fSearch').value='';
  applyFilters();
}

build();
loadDoneState();
</script>
